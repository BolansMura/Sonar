name: CI Build and SonarCloud Analysis

on:
  push:
    branches: [ main, master ]  # Запуск при пуше в главную ветку
  pull_request:
    branches: [ main, master ]  # Запуск при создании PR

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Нужно для полного анализа истории SonarCloud

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache SonarCloud packages
        uses: actions/cache@v3
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and analyze with Maven
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Автоматически генерируется GitHub
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # Тот секрет, что вы создали
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
